<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reservas Backup</title>

<link rel="stylesheet" href="style.css" />

</head>

<body>

<div id="app">

<!-- LOGIN -->
<section id="login-screen" class="screen active">
  <div class="login-wrap">
    <h1>Iniciar sesión</h1>

    <div id="login-error" class="error-msg" style="display:none"></div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="login-user" required>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" required>
    </div>

    <button id="login-btn" class="btn-primary" onclick="doLogin()">Entrar</button>
  </div>
</section>

<!-- CAMBIO PASSWORD -->
<section id="change-pass-screen" class="screen">
  <div class="login-wrap">

    <h1 id="cp-title">Cambiar contraseña</h1>
    <p id="cp-sub"></p>

    <div id="cp-error" class="error-msg" style="display:none"></div>

    <div class="form-group">
      <label>Nueva contraseña</label>
      <input type="password" id="cp-new">
    </div>

    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="cp-confirm">
    </div>

    <button id="cp-btn" class="btn-primary" onclick="saveNewPassword()">Guardar</button>
  </div>
</section>

<!-- APP -->
<section id="app-screen" class="screen">

<header class="navbar">
  <div class="nav-left">
    <span class="nav-title">Reservas Backup</span>
  </div>

  <div class="nav-right">
    <div id="nav-user" class="user-chip"></div>
    <button onclick="showChangePassword(false)" class="btn-logout">🔑</button>
    <button onclick="doLogout()" class="btn-logout">Salir</button>
  </div>
</header>

<main class="container">

<div class="main-grid">

<!-- CAL -->
<section class="cal-section">
  <div class="cal-header">
    <button onclick="changeMonth(-1)">‹</button>
    <h2 id="cal-title"></h2>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <div id="cal-grid" class="cal-grid"></div>
</section>

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="card">
  <h3 class="card-title">Hoy estás en</h3>
  <div id="today-location" class="status-indicator status-none">Sin asignación</div>
</div>

<div class="card">
  <h3 class="card-title">Solicitar día</h3>
  <input type="date" id="req-date">
  <input type="text" id="req-note" placeholder="Nota">
  <button id="req-btn" onclick="submitRequest()" class="btn-primary">Solicitar</button>
</div>

<div class="card">
  <h3 class="card-title">Solicitudes</h3>
  <div id="req-list"></div>
</div>

</aside>

</div>
</main>
</section>
</div>

<div id="modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
